<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>상상이 현실로, 내가 만드는 가상 공간</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin: 20px 0;
  font-size: 28px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  padding: 20px;
  max-width: 1000px;
  margin: 0 auto;
}

.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s;
}

.card:hover, .card:focus {
  transform: scale(1.05);
  background: #334155;
  outline: none;
}

.card span {
  display: block;
  margin-top: 8px;
  font-size: 14px;
  color: #cbd5f5;
}

/* 전체 화면 뷰 */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  z-index: 999;
}

.viewer iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.closeBtn {
  position: absolute;
  top: 10px;
  right: 20px;
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 1000;
}
</style>

</head>

<body>

<h1>상상이 현실로, 내가 만드는 가상 공간</h1>
<p>보고 싶은 작품을 선택하세요</p>

<div class="grid">

<!-- 1~18번 버튼 -->
<!-- URL만 바꿔서 사용 -->

<script>
const links = [
"https://edu.delightex.com/CXB-YJR",
"https://edu.delightex.com/REPLACE2",
"https://edu.delightex.com/REPLACE3",
"https://edu.delightex.com/REPLACE4",
"https://edu.delightex.com/REPLACE5",
"https://edu.delightex.com/REPLACE6",
"https://edu.delightex.com/REPLACE7",
"https://edu.delightex.com/REPLACE8",
"https://edu.delightex.com/REPLACE9",
"https://edu.delightex.com/REPLACE10",
"https://edu.delightex.com/REPLACE11",
"https://edu.delightex.com/REPLACE12",
"https://edu.delightex.com/REPLACE13",
"https://edu.delightex.com/REPLACE14",
"https://edu.delightex.com/REPLACE15",
"https://edu.delightex.com/REPLACE16",
"https://edu.delightex.com/REPLACE17",
"https://edu.delightex.com/REPLACE18"
];

const grid = document.currentScript.parentElement;

links.forEach((url, i) => {
  const div = document.createElement("div");
  div.className = "card";
  div.tabIndex = 0;
  div.innerHTML = `<strong>${i+1}번</strong><span>작품 보기</span>`;
  div.onclick = () => openViewer(url);
  div.onkeypress = (e) => { if(e.key === "Enter") openViewer(url); };
  grid.appendChild(div);
});
</script>

</div>

<!-- 전체화면 viewer -->
<div class="viewer" id="viewer">
  <div class="closeBtn" onclick="closeViewer()">닫기 ✕</div>
  <iframe id="frame"></iframe>
</div>

<script>
function openViewer(url) {
  const viewer = document.getElementById("viewer");
  const frame = document.getElementById("frame");

  frame.src = url;
  viewer.style.display = "block";
}

function closeViewer() {
  const viewer = document.getElementById("viewer");
  const frame = document.getElementById("frame");

  frame.src = "";
  viewer.style.display = "none";
}
</script>

</body>
</html>
